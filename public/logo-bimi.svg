<svg xmlns="http://www.w3.org/2000/svg" version="1.2" baseProfile="tiny-ps" viewBox="0 0 580 580" width="580" height="580">
  <title>Nemesis</title>
  <defs>
    <!-- ============ NUCLEUS ============ -->
    <radialGradient id="coreOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0000"/>
      <stop offset="22%"  stop-color="#9B2000"/>
      <stop offset="52%"  stop-color="#E05500"/>
      <stop offset="74%"  stop-color="#FF9200"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="coreInner" cx="44%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="42%"  stop-color="#150200"/>
      <stop offset="100%" stop-color="#6B0E00"/>
    </radialGradient>
    <radialGradient id="coreHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF7000" stop-opacity="0.9"/>
      <stop offset="35%"  stop-color="#CC3300" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#800000" stop-opacity="0"/>
    </radialGradient>
    <!-- ============ ORBIT STROKES ============ -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6B1A0C"/>
      <stop offset="38%"  stop-color="#C44020"/>
      <stop offset="68%"  stop-color="#D4522A"/>
      <stop offset="100%" stop-color="#7B241C"/>
    </linearGradient>
    <!-- ============ NODES ============ -->
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E0F8FF"/>
      <stop offset="40%"  stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0"/>
    </radialGradient>
    <!-- ============ PLANETS ============ -->
    <radialGradient id="earthGrad" cx="34%" cy="33%" r="66%">
      <stop offset="0%"   stop-color="#BAE6FD"/>
      <stop offset="32%"  stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="34%" cy="33%" r="66%">
      <stop offset="0%"   stop-color="#9A9A9A"/>
      <stop offset="52%"  stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
    <radialGradient id="saturnGrad" cx="34%" cy="33%" r="66%">
      <stop offset="0%"   stop-color="#E0B84A"/>
      <stop offset="50%"  stop-color="#8A6200"/>
      <stop offset="100%" stop-color="#3D2E00"/>
    </radialGradient>
    <radialGradient id="marsGrad" cx="34%" cy="33%" r="66%">
      <stop offset="0%"   stop-color="#E07848"/>
      <stop offset="48%"  stop-color="#8B3018"/>
      <stop offset="100%" stop-color="#3A1008"/>
    </radialGradient>
  </defs>
  <g transform="translate(290,290)">
    <circle cx="0" cy="0" r="200" fill="url(#coreHalo)" opacity="0.1"/>
    <ellipse cx="0" cy="0" rx="220" ry="68" fill="none" stroke="url(#orbitGrad)" stroke-width="15.5" stroke-linecap="round" opacity="0.96"/>
    <ellipse cx="0" cy="0" rx="220" ry="68" fill="none" stroke="url(#orbitGrad)" stroke-width="15.5" stroke-linecap="round" opacity="0.96" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="220" ry="68" fill="none" stroke="url(#orbitGrad)" stroke-width="15.5" stroke-linecap="round" opacity="0.96" transform="rotate(-60)"/>
    <g>
      <circle cx="103"  cy="60"   r="5.5" fill="url(#nodeGrad)" opacity="0.88"/>
      <circle cx="103"  cy="-60"  r="5.5" fill="url(#nodeGrad)" opacity="0.88"/>
      <circle cx="0"    cy="-120" r="5.5" fill="url(#nodeGrad)" opacity="0.88"/>
      <circle cx="-103" cy="-60"  r="5.5" fill="url(#nodeGrad)" opacity="0.88"/>
      <circle cx="-103" cy="60"   r="5.5" fill="url(#nodeGrad)" opacity="0.88"/>
      <circle cx="0"    cy="120"  r="5.5" fill="url(#nodeGrad)" opacity="0.88"/>
    </g>
    <circle cx="0" cy="0" r="96" fill="url(#coreHalo)" opacity="0.5"/>
    <circle cx="0" cy="0" r="78" fill="url(#coreOuter)"/>
    <circle cx="0" cy="0" r="46" fill="url(#coreInner)"/>
    <g transform="translate(220,0)">
      <circle r="26" fill="url(#earthGrad)" stroke="#075985" stroke-width="1.5"/>
      <path d="M-5,-12 Q3,-9 10,-3 Q7,6 0,9 Q-9,6 -12,0 Q-12,-9 -5,-12Z" fill="#15803D" opacity="0.72"/>
      <path d="M7,2 Q13,-1 16,6 Q13,13 7,13 Q2,9 7,2Z" fill="#15803D" opacity="0.55"/>
      <circle cx="7" cy="-15" r="5.5" fill="#15803D" opacity="0.45"/>
    </g>
    <g transform="translate(-220,0)">
      <circle r="22" fill="url(#moonGrad)" stroke="#111" stroke-width="1.5" />
      <circle cx="-4" cy="-4" r="4.5" fill="#2A2A2A" opacity="0.65" />
      <circle cx="6"  cy="6"  r="3"   fill="#2A2A2A" opacity="0.5" />
    </g>
    <g transform="translate(-110,-190)">
      <circle r="21" fill="url(#saturnGrad)" stroke="#3D2E00" stroke-width="1.5"/>
    </g>
    <g transform="translate(110,190)">
      <circle r="21" fill="url(#marsGrad)" stroke="#5D1A08" stroke-width="1.5"/>
    </g>
  </g>
</svg>
